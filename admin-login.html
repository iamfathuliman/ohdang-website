<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — OhDang.</title>
  <link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;700;800&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/admin.css"/>
  <style>
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#FDF6F0;}
    .card{background:#fff;border-radius:16px;padding:52px 44px;width:100%;max-width:400px;box-shadow:0 8px 40px rgba(0,0,0,0.1);border-top:6px solid #D42B2B;text-align:center;}
    .logo{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:28px;}
    .logo img{width:54px;height:54px;border-radius:50%;object-fit:cover;border:3px solid #D42B2B;}
    .logo span{font-family:'Boogaloo',cursive;font-size:2.1rem;color:#1a1212;}
    .logo em{font-style:italic;color:#1E4FC2;font-family:'Playfair Display',serif;}
    h2{font-family:'Boogaloo',cursive;font-size:1.7rem;margin-bottom:6px;}
    .sub{color:#888;font-size:0.9rem;margin-bottom:28px;}
    .err{background:#ffeaea;color:#D42B2B;padding:10px 16px;border-radius:8px;font-size:0.88rem;font-weight:700;margin-bottom:16px;display:none;}
    input{width:100%;padding:14px 18px;border:2px solid #e8e8e8;border-radius:10px;font-family:'Nunito',sans-serif;font-size:1rem;margin-bottom:12px;outline:none;transition:border-color 0.2s;}
    input:focus{border-color:#D42B2B;}
    button{width:100%;padding:14px;background:#D42B2B;color:#fff;border:none;border-radius:10px;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;transition:background 0.2s;}
    button:hover{background:#a81f1f;}
    .back{display:inline-block;margin-top:20px;color:#888;font-size:0.88rem;}
    .back:hover{color:#D42B2B;}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="images/mascot.jpeg" alt="OhDang"/>
      <span><em>Oh</em>dang.</span>
    </div>
    <h2>Admin Login</h2>
    <p class="sub">Business dashboard access only</p>
    <div class="err" id="err">Incorrect password. Try again.</div>
    <input type="password" id="pw" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')login()"/>
    <button onclick="login()">Login →</button>
    <br/><a href="index.html" class="back">← Back to website</a>
  </div>
  <script>
    const PW='Ohdanggg!022026';
    function login(){
      const v=document.getElementById('pw').value;
      if(v===PW){sessionStorage.setItem('od_admin','1');window.location.href='admin.html';}
      else{document.getElementById('err').style.display='block';document.getElementById('pw').value='';}
    }
  </script>
</body>
</html>
